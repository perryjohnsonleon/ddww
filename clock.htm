<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CLOCK</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #060810;
      --panel: #0c1020;
      --glow: #00f0ff;
      --glow2: #ff2d78;
      --dim: #0a2a30;
      --text: #e0faff;
      --tick: #1a3a45;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
      position: relative;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,240,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,240,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridMove {
      0%   { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }

    /* Ambient orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    .orb1 {
      width: 400px; height: 400px;
      background: rgba(0, 240, 255, 0.07);
      top: -100px; left: -100px;
      animation: orbFloat1 12s ease-in-out infinite alternate;
    }
    .orb2 {
      width: 350px; height: 350px;
      background: rgba(255, 45, 120, 0.06);
      bottom: -80px; right: -80px;
      animation: orbFloat2 14s ease-in-out infinite alternate;
    }

    @keyframes orbFloat1 { to { transform: translate(60px, 80px); } }
    @keyframes orbFloat2 { to { transform: translate(-60px, -80px); } }

    /* Wrapper */
    .clock-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      position: relative;
      z-index: 10;
    }

    /* Header label */
    .label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 8px;
      color: var(--glow);
      opacity: 0.6;
      text-transform: uppercase;
    }

    /* Analog clock */
    .analog-wrap {
      position: relative;
      width: 240px;
      height: 240px;
    }

    .ring-outer {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(0,240,255,0.15);
      box-shadow:
        0 0 0 8px rgba(0,240,255,0.04),
        0 0 40px rgba(0,240,255,0.08),
        inset 0 0 40px rgba(0,240,255,0.05);
      background: radial-gradient(circle at 40% 30%, rgba(0,240,255,0.06), transparent 60%),
                  radial-gradient(circle at 60% 70%, rgba(255,45,120,0.04), transparent 60%),
                  var(--panel);
    }

    /* Tick marks */
    .ticks {
      position: absolute;
      inset: 0;
    }

    canvas#tickCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* Hands */
    .hands {
      position: absolute;
      inset: 0;
    }

    .hand {
      position: absolute;
      bottom: 50%;
      left: 50%;
      transform-origin: bottom center;
      border-radius: 4px 4px 0 0;
    }

    .hand-hour {
      width: 3px;
      height: 68px;
      margin-left: -1.5px;
      background: linear-gradient(to top, var(--glow), rgba(0,240,255,0.4));
      box-shadow: 0 0 8px var(--glow), 0 0 20px rgba(0,240,255,0.3);
    }

    .hand-min {
      width: 2px;
      height: 90px;
      margin-left: -1px;
      background: linear-gradient(to top, #fff, rgba(255,255,255,0.5));
      box-shadow: 0 0 6px rgba(255,255,255,0.6);
    }

    .hand-sec {
      width: 1px;
      height: 100px;
      margin-left: -0.5px;
      background: var(--glow2);
      box-shadow: 0 0 6px var(--glow2), 0 0 16px rgba(255,45,120,0.4);
    }

    /* Center dot */
    .center-dot {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--glow2);
      box-shadow: 0 0 12px var(--glow2), 0 0 24px rgba(255,45,120,0.5);
      z-index: 10;
    }

    /* Digital display */
    .digital-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .time-display {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .digit-group {
      display: flex;
      gap: 2px;
    }

    .digit {
      background: var(--panel);
      border: 1px solid rgba(0,240,255,0.12);
      color: var(--glow);
      font-family: 'Share Tech Mono', monospace;
      font-size: 52px;
      line-height: 1;
      width: 54px;
      text-align: center;
      padding: 8px 0 6px;
      border-radius: 4px;
      position: relative;
      overflow: hidden;
      text-shadow: 0 0 20px var(--glow), 0 0 40px rgba(0,240,255,0.3);
      box-shadow: inset 0 0 20px rgba(0,240,255,0.04);
      transition: color 0.08s;
    }

    .digit::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: 50%; height: 1px;
      background: rgba(0,240,255,0.06);
    }

    .separator {
      font-size: 52px;
      color: var(--glow);
      opacity: 0.4;
      line-height: 1;
      padding-bottom: 6px;
      animation: blink 1s step-end infinite;
      text-shadow: 0 0 20px var(--glow);
    }

    @keyframes blink { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.1; } }

    .ampm {
      font-size: 16px;
      color: var(--glow2);
      letter-spacing: 2px;
      text-shadow: 0 0 10px var(--glow2);
      align-self: flex-end;
      padding-bottom: 10px;
    }

    /* Date row */
    .date-row {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .date-chip {
      font-size: 11px;
      letter-spacing: 3px;
      color: rgba(0,240,255,0.5);
      text-transform: uppercase;
    }

    .date-dot {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--glow2);
      opacity: 0.6;
    }

    /* Seconds bar */
    .sec-bar-wrap {
      width: 320px;
      height: 2px;
      background: rgba(0,240,255,0.08);
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .sec-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--glow), var(--glow2));
      border-radius: 2px;
      transition: width 0.25s linear;
      box-shadow: 0 0 8px var(--glow);
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Fade in */
    .clock-wrapper {
      animation: fadeUp 1s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="clock-wrapper">

    <div class="label">System Clock</div>

    <!-- Analog -->
    <div class="analog-wrap">
      <div class="ring-outer"></div>
      <canvas id="tickCanvas" width="240" height="240"></canvas>
      <div class="hands">
        <div class="hand hand-hour" id="handHour"></div>
        <div class="hand hand-min"  id="handMin"></div>
        <div class="hand hand-sec"  id="handSec"></div>
      </div>
      <div class="center-dot"></div>
    </div>

    <!-- Digital -->
    <div class="digital-block">
      <div class="time-display">
        <div class="digit-group">
          <div class="digit" id="h1">0</div>
          <div class="digit" id="h2">0</div>
        </div>
        <div class="separator">:</div>
        <div class="digit-group">
          <div class="digit" id="m1">0</div>
          <div class="digit" id="m2">0</div>
        </div>
        <div class="separator">:</div>
        <div class="digit-group">
          <div class="digit" id="s1">0</div>
          <div class="digit" id="s2">0</div>
        </div>
        <div class="ampm" id="ampm">AM</div>
      </div>

      <div class="date-row">
        <div class="date-chip" id="dayName">Monday</div>
        <div class="date-dot"></div>
        <div class="date-chip" id="dateStr">01 Jan 2025</div>
      </div>
    </div>

    <!-- Seconds progress bar -->
    <div class="sec-bar-wrap">
      <div class="sec-bar" id="secBar"></div>
    </div>

  </div>

  <script>
    // Draw tick marks on canvas
    const canvas = document.getElementById('tickCanvas');
    const ctx = canvas.getContext('2d');
    const cx = 120, cy = 120, R = 108;

    function drawTicks() {
      ctx.clearRect(0, 0, 240, 240);
      for (let i = 0; i < 60; i++) {
        const angle = (i / 60) * Math.PI * 2 - Math.PI / 2;
        const isMajor = i % 5 === 0;
        const inner = R - (isMajor ? 14 : 6);
        const outer = R;
        const x1 = cx + Math.cos(angle) * inner;
        const y1 = cy + Math.sin(angle) * inner;
        const x2 = cx + Math.cos(angle) * outer;
        const y2 = cy + Math.sin(angle) * outer;

        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.strokeStyle = isMajor ? 'rgba(0,240,255,0.5)' : 'rgba(0,240,255,0.18)';
        ctx.lineWidth = isMajor ? 2 : 1;
        ctx.stroke();
      }

      // Hour numbers
      ctx.font = '700 10px "Share Tech Mono"';
      ctx.fillStyle = 'rgba(0,240,255,0.45)';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (let h = 1; h <= 12; h++) {
        const angle = (h / 12) * Math.PI * 2 - Math.PI / 2;
        const nr = R - 26;
        ctx.fillText(h, cx + Math.cos(angle) * nr, cy + Math.sin(angle) * nr);
      }
    }
    drawTicks();

    // Clock update
    const handH = document.getElementById('handHour');
    const handM = document.getElementById('handMin');
    const handS = document.getElementById('handSec');
    const secBar = document.getElementById('secBar');
    const ampmEl = document.getElementById('ampm');
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function pad(n) { return String(n).padStart(2,'0'); }

    function setDigit(id, val) {
      const el = document.getElementById(id);
      if (el.textContent !== val) el.textContent = val;
    }

    function update() {
      const now = new Date();
      const h = now.getHours();
      const m = now.getMinutes();
      const s = now.getSeconds();
      const ms = now.getMilliseconds();

      // Analog smooth
      const secDeg  = (s + ms / 1000) * 6;
      const minDeg  = m * 6 + s * 0.1;
      const hourDeg = (h % 12) * 30 + m * 0.5;

      handH.style.transform = `rotate(${hourDeg}deg)`;
      handM.style.transform = `rotate(${minDeg}deg)`;
      handS.style.transform = `rotate(${secDeg}deg)`;

      // Digital
      const h12 = h % 12 || 12;
      const hStr = pad(h12);
      const mStr = pad(m);
      const sStr = pad(s);

      setDigit('h1', hStr[0]);
      setDigit('h2', hStr[1]);
      setDigit('m1', mStr[0]);
      setDigit('m2', mStr[1]);
      setDigit('s1', sStr[0]);
      setDigit('s2', sStr[1]);
      ampmEl.textContent = h < 12 ? 'AM' : 'PM';

      // Date
      document.getElementById('dayName').textContent = days[now.getDay()];
      document.getElementById('dateStr').textContent =
        `${pad(now.getDate())} ${months[now.getMonth()]} ${now.getFullYear()}`;

      // Seconds bar
      const pct = ((s + ms / 1000) / 60) * 100;
      secBar.style.width = pct + '%';
    }

    update();
    setInterval(update, 50);
  </script>
</body>
</html>
